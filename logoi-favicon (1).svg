<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0a0a0a"/>
  <!-- Outer triangle outline -->
  <polygon 
    points="32,6 60,58 4,58" 
    fill="none" 
    stroke="#00c9a7" 
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- Inner glow fill -->
  <polygon 
    points="32,14 54,54 10,54" 
    fill="url(#glowFill)"
    opacity="0.25"
  />
  <defs>
    <linearGradient id="glowFill" x1="32" y1="14" x2="32" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c9a7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00c9a7" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
